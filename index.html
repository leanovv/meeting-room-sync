<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>会议室系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            color: #333;
        }
        h1 {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
        .status {
            text-align: center;
            padding: 10px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            display: block;
            width: 220px;
            margin: 0 auto 30px;
            font-size: 14px;
        }
        
        /* 会议室选择器 */
        .room-selector {
            margin-bottom: 20px;
        }
        .room-selector label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }
        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .room-btn {
            padding: 20px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-size: 16px;
        }
        .room-btn:hover {
            background: #e9ecef;
            border-color: #667eea;
        }
        .room-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .selected-room {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
            color: #0066cc;
            font-weight: bold;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #5568d3; }
        button:active { transform: scale(0.98); }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .success {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
        .meeting-display {
            display: none;
        }
        .tips {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .tips h3 { margin-bottom: 10px; }
        .tips p { margin: 5px 0; font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>会议室 <span id="roomNum">系统</span></h1>
        <div class="status" id="status">● 在线</div>

        <!-- 会议室选择界面（仅手机/电脑端） -->
        <div class="card" id="selectorArea" style="display: none;">
            <h2 style="margin-bottom: 20px;">📍 选择要发送的会议室</h2>
            
            <div class="room-selector">
                <div class="room-grid" id="roomGrid">
                    <!-- 动态生成会议室按钮 -->
                </div>
            </div>
            
            <div class="selected-room" id="selectedRoomDisplay" style="display: none;">
                已选择：<span id="selectedRoomName"></span>
            </div>
            
            <h3 style="margin: 20px 0 10px 0;">📋 粘贴会议链接</h3>
            <textarea 
                id="meetingLinkSelector" 
                placeholder="从 Teams 或 Outlook 复制会议链接..."></textarea>
            <button onclick="sendMeetingWithSelector()" id="sendBtnSelector" disabled>选择会议室后发送 →</button>
            <div class="success" id="successMsgSelector">✓ 已发送成功！</div>
        </div>

        <!-- 输入区域（大屏端） -->
        <div class="card" id="inputArea" style="display: none;">
            <h2 style="margin-bottom: 15px;">📋 粘贴会议链接</h2>
            <p style="color: #666; margin-bottom: 15px;">从 Teams 或 Outlook 复制会议链接</p>
            <textarea 
                id="meetingLink" 
                placeholder="粘贴会议链接到这里..."></textarea>
            <button onclick="sendMeeting()">发送到大屏 →</button>
            <div class="success" id="successMsg">✓ 已发送成功！</div>
        </div>

        <!-- 会议显示区域 -->
        <div class="card meeting-display" id="meetingArea">
            <h2 id="meetingTitle" style="font-size: 28px; margin-bottom: 10px;">Teams 会议</h2>
            <p style="color: #666; margin-bottom: 20px;" id="meetingTime"></p>
            <button onclick="joinMeeting()" class="btn-success">🎥 加入会议</button>
            <button onclick="backToInput()" class="btn-secondary" style="margin-top: 10px;">← 返回</button>
        </div>

        <!-- 使用提示 -->
        <div class="tips" id="tipsArea">
            <h3>💡 使用说明</h3>
            <p id="tipText">• 系统每 3 秒自动检查更新</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        console.log('=== 会议室系统启动 ===');
        
        // 配置
        var SUPABASE_URL = 'https://yruovhpprgmfaaypskww.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlydW92aHBwcmdtZmFheXBza3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Nzg5NTQsImV4cCI6MjA4OTU1NDk1NH0.sw2LmaNMWNQNpObl5nIWgJMzmRmDkkb6zbwBeQBtU4c';
        
        // 会议室配置（可自定义）
        var ROOMS = [
            { id: 'room1', name: '会议室 1' },
            { id: 'room2', name: '会议室 2' },
            { id: 'room3', name: '会议室 3' },
            { id: 'room4', name: '会议室 4' },
            { id: 'room5', name: '会议室 5' },
            { id: 'room6', name: '会议室 6' }
        ];
        
        // 全局变量
        var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        var params = new URLSearchParams(location.search);
        var roomId = params.get('room');
        var currentLink = '';
        var lastCreatedAt = null;
        var checkInterval;
        var selectedRoom = null;
        
        // 初始化
        init();
        
        function init() {
            if (roomId) {
                // 大屏模式（带 room 参数）
                initDisplayMode();
            } else {
                // 选择器模式（无 room 参数）
                initSelectorMode();
            }
        }
        
        // === 大屏模式 ===
        function initDisplayMode() {
            console.log('大屏模式 - 房间:', roomId);
            
            document.getElementById('roomNum').textContent = getRoomName(roomId);
            document.getElementById('inputArea').style.display = 'block';
            document.getElementById('selectorArea').style.display = 'none';
            
            var tipsEl = document.getElementById('tipsArea');
            tipsEl.querySelector('h3').textContent = '💡 大屏模式';
            tipsEl.querySelector('#tipText').innerHTML = 
                '• 系统每 3 秒自动检查更新<br>' +
                '• 手机发送后会自动显示<br>' +
                '• 也可以在此大屏直接输入';
            
            loadExistingMeeting();
            startAutoCheck();
        }
        
        // === 选择器模式 ===
        function initSelectorMode() {
            console.log('选择器模式');
            
            document.getElementById('roomNum').textContent = '选择';
            document.getElementById('selectorArea').style.display = 'block';
            document.getElementById('inputArea').style.display = 'none';
            
            var tipsEl = document.getElementById('tipsArea');
            tipsEl.querySelector('h3').textContent = '💡 手机端模式';
            tipsEl.querySelector('#tipText').innerHTML = 
                '• 选择要发送的会议室<br>' +
                '• 粘贴会议链接<br>' +
                '• 大屏会自动显示';
            
            // 渲染会议室按钮
            renderRoomButtons();
        }
        
        // 渲染会议室按钮
        function renderRoomButtons() {
            var grid = document.getElementById('roomGrid');
            grid.innerHTML = '';
            
            ROOMS.forEach(function(room) {
                var btn = document.createElement('div');
                btn.className = 'room-btn';
                btn.textContent = room.name;
                btn.onclick = function() {
                    selectRoom(room);
                };
                grid.appendChild(btn);
            });
        }
        
        // 选择会议室
        function selectRoom(room) {
            selectedRoom = room.id;
            
            // 更新按钮状态
            var buttons = document.querySelectorAll('.room-btn');
            buttons.forEach(function(btn) {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
            
            // 显示已选择
            document.getElementById('selectedRoomDisplay').style.display = 'block';
            document.getElementById('selectedRoomName').textContent = room.name;
            
            // 启用发送按钮
            document.getElementById('sendBtnSelector').disabled = false;
            document.getElementById('sendBtnSelector').textContent = '发送到 ' + room.name + ' →';
            
            console.log('已选择:', room.name);
        }
        
        // 选择器模式发送
        async function sendMeetingWithSelector() {
            if (!selectedRoom) {
                alert('请先选择会议室');
                return;
            }
            
            var link = document.getElementById('meetingLinkSelector').value.trim();
            
            if (!link) {
                alert('请先粘贴会议链接');
                return;
            }
            
            if (!link.startsWith('http://') && !link.startsWith('https://')) {
                alert('请输入完整的网址（以 http:// 或 https:// 开头）');
                return;
            }
            
            console.log('发送到会议室:', selectedRoom);
            await sendToRoom(selectedRoom, link);
            
            // 显示成功
            var successEl = document.getElementById('successMsgSelector');
            successEl.style.display = 'block';
            setTimeout(function() {
                successEl.style.display = 'none';
            }, 3000);
            
            // 清空输入
            document.getElementById('meetingLinkSelector').value = '';
        }
        
        // === 通用函数 ===
        
        // 获取会议室名称
        function getRoomName(id) {
            var room = ROOMS.find(function(r) { return r.id === id; });
            return room ? room.name : id;
        }
        
        // 发送到指定房间
        async function sendToRoom(targetRoomId, link) {
            console.log('发送会议到:', targetRoomId);
            
            try {
                // 直接保存北京时间字符串
                var date = new Date();
                var now = date.getFullYear() + '-' + 
                          String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                          String(date.getDate()).padStart(2, '0') + ' ' +
                          String(date.getHours()).padStart(2, '0') + ':' + 
                          String(date.getMinutes()).padStart(2, '0') + ':' + 
                          String(date.getSeconds()).padStart(2, '0');
                console.log('保存的北京时间:', now);    
                var result = await db
                    .from('meetings')
                    .upsert({ 
                        room_id: targetRoomId, 
                        link: link,
                        title: '即将开始的会议',
                        created_at: now
                    }, {
                        onConflict: 'room_id'
                    });
                
                if (result.error) {
                    console.error('发送失败:', result.error);
                    alert('发送失败: ' + result.error.message);
                    return false;
                }
                
                console.log('✓ 发送成功');
                return true;
                
            } catch (e) {
                console.error('发送异常:', e);
                alert('发送失败: ' + e.message);
                return false;
            }
        }
        
        // 大屏模式发送
        async function sendMeeting() {
            var link = document.getElementById('meetingLink').value.trim();
            
            if (!link) {
                alert('请先粘贴会议链接');
                return;
            }
            
            if (!link.startsWith('http://') && !link.startsWith('https://')) {
                alert('请输入完整的网址');
                return;
            }
            
            var success = await sendToRoom(roomId, link);
            
            if (success) {
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(function() {
                    document.getElementById('successMsg').style.display = 'none';
                    checkForUpdates();
                }, 1500);
            }
        }
        
        // 加载已有会议
        async function loadExistingMeeting() {
            try {
                console.log('加载会议数据...');
                var result = await db
                    .from('meetings')
                    .select('*')
                    .eq('room_id', roomId)
                    .single();
                
                if (result.data && result.data.link) {
                    console.log('找到已有会议');
                    lastCreatedAt = result.data.created_at;
                    showMeeting(result.data);
                    document.getElementById('status').textContent = '● 在线 - 已加载';
                } else {
                    console.log('无已有会议');
                    document.getElementById('status').textContent = '● 在线 - 等待会议';
                }
            } catch (e) {
                console.log('加载会议:', e.message);
                document.getElementById('status').textContent = '● 在线 - 等待会议';
            }
        }
        
        // 启动自动检查
        function startAutoCheck() {
            console.log('启动自动检查（每3秒）');
            
            checkInterval = setInterval(function() {
                checkForUpdates();
            }, 3000);
        }
        
        // 检查更新
        async function checkForUpdates() {
            try {
                var result = await db
                    .from('meetings')
                    .select('*')
                    .eq('room_id', roomId)
                    .single();
                
                if (result.data && result.data.link) {
                    var newCreatedAt = result.data.created_at;
                    
                    if (!lastCreatedAt || newCreatedAt !== lastCreatedAt) {
                        console.log('🔔 检测到新会议！');
                        lastCreatedAt = newCreatedAt;
                        showMeeting(result.data);
                        
                        var time = new Date().toLocaleTimeString();
                        document.getElementById('status').textContent = '● 已更新 (' + time + ')';
                    }
                }
            } catch (e) {
                if (e.code !== 'PGRST116') {
                    console.error('检查失败:', e.message);
                }
            }
        }
        
        // 显示会议
        function showMeeting(data) {
            console.log('显示会议:', data.title);
            currentLink = data.link;
            
            document.getElementById('meetingTitle').textContent = data.title || 'Teams 会议';
            
            if (data.created_at) {
                // 彻底修复时区 - 直接使用客户端本地时间
                var date = new Date(data.created_at);
                
                // 如果是 ISO 格式，转换一下
                if (time.includes('T')) {
                    var date = new Date(time);
                    time = date.getFullYear() + '-' + 
                           String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                           String(date.getDate()).padStart(2, '0') + ' ' +
                           String(date.getHours()).padStart(2, '0') + ':' + 
                           String(date.getMinutes()).padStart(2, '0') + ':' + 
                           String(date.getSeconds()).padStart(2, '0');
                }
                
                document.getElementById('meetingTime').textContent = '发送时间: ' + time;
                console.log('显示时间:', time);
            }
            
            document.getElementById('inputArea').style.display = 'none';
            if (document.getElementById('selectorArea')) {
                document.getElementById('selectorArea').style.display = 'none';
            }
            document.getElementById('meetingArea').style.display = 'block';
        }
        
        // 返回输入
        function backToInput() {
            document.getElementById('inputArea').style.display = 'block';
            document.getElementById('meetingArea').style.display = 'none';
            document.getElementById('meetingLink').value = '';
        }
        
        // 加入会议
        function joinMeeting() {
            if (!currentLink) return;
            
            console.log('加入会议:', currentLink);
            
            var teamsProtocol = currentLink.replace('https://', 'msteams://');
            window.location.href = teamsProtocol;
            
            setTimeout(function() {
                window.open(currentLink, '_self');
            }, 1000);
        }
        
        console.log('=== 系统就绪 ===');
    </script>
</body>
</html>
