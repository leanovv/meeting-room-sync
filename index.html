<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>会议室系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            color: #333;
        }
        h1 {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
        .status {
            text-align: center;
            padding: 10px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            display: block;
            width: 220px;
            margin: 0 auto 30px;
            font-size: 14px;
        }
        .status.checking {
            background: #17a2b8;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #5568d3; }
        button:active { transform: scale(0.98); }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .success {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
        .meeting-display {
            display: none;
        }
        .meeting-title {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .meeting-time {
            color: #666;
            margin-bottom: 20px;
        }
        .tips {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .tips h3 { margin-bottom: 10px; }
        .tips p { margin: 5px 0; font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <h1>会议室 <span id="roomNum">1</span></h1>
        <div class="status" id="status">● 自动检查更新中...</div>

        <!-- 输入区域 -->
        <div class="card" id="inputArea">
            <h2 style="margin-bottom: 15px;">📋 粘贴会议链接</h2>
            <p style="color: #666; margin-bottom: 15px;">从 Teams 或 Outlook 复制会议链接</p>
            <textarea 
                id="meetingLink" 
                placeholder="粘贴会议链接到这里...&#10;&#10;例如：&#10;https://teams.microsoft.com/l/meetup-join/..."></textarea>
            <button onclick="sendMeeting()">发送到大屏 →</button>
            <div class="success" id="successMsg">✓ 已发送成功！</div>
        </div>

        <!-- 会议显示区域 -->
        <div class="card meeting-display" id="meetingArea">
            <div class="meeting-title" id="meetingTitle">Teams 会议</div>
            <div class="meeting-time" id="meetingTime"></div>
            <button onclick="joinMeeting()" class="btn-success">🎥 加入会议</button>
            <button onclick="backToInput()" class="btn-secondary" style="margin-top: 10px;">← 返回输入</button>
        </div>

        <!-- 使用提示 -->
        <div class="tips">
            <h3>💡 使用说明</h3>
            <p>• 系统每 3 秒自动检查更新</p>
            <p>• 手机发送后，大屏会自动显示</p>
            <p>• 多个设备可同时打开同一房间</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        console.log('=== 会议室系统启动 ===');
        
        // 配置
        var SUPABASE_URL = 'https://yruovhpprgmfaaypskww.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlydW92aHBwcmdtZmFheXBza3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Nzg5NTQsImV4cCI6MjA4OTU1NDk1NH0.sw2LmaNMWNQNpObl5nIWgJMzmRmDkkb6zbwBeQBtU4c';
        
        // 全局变量
        var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        var params = new URLSearchParams(location.search);
        var roomId = params.get('room') || 'room1';
        var currentLink = '';
        var lastCreatedAt = null;
        var checkInterval;
        
        // 初始化
        document.getElementById('roomNum').textContent = roomId.replace('room', '');
        console.log('房间 ID:', roomId);
        
        // 启动
        init();
        
        function init() {
            console.log('初始化系统...');
            
            // 加载已有会议
            loadExistingMeeting();
            
            // 启动自动检查（每3秒）
            startAutoCheck();
        }
        
        // 加载已有会议
        async function loadExistingMeeting() {
            try {
                console.log('加载会议数据...');
                var result = await db
                    .from('meetings')
                    .select('*')
                    .eq('room_id', roomId)
                    .single();
                
                if (result.data && result.data.link) {
                    console.log('找到已有会议');
                    lastCreatedAt = result.data.created_at;
                    showMeeting(result.data);
                    updateStatus('在线 - 已加载会议');
                } else {
                    console.log('无已有会议');
                    updateStatus('在线 - 等待会议');
                }
            } catch (e) {
                console.log('加载会议:', e.message);
                updateStatus('在线 - 等待会议');
            }
        }
        
        // 启动自动检查
        function startAutoCheck() {
            console.log('启动自动检查（每3秒）');
            updateStatus('在线 - 自动检查中');
            
            checkInterval = setInterval(function() {
                checkForUpdates();
            }, 3000); // 每3秒检查一次
        }
        
        // 检查更新
        async function checkForUpdates() {
            try {
                var result = await db
                    .from('meetings')
                    .select('*')
                    .eq('room_id', roomId)
                    .single();
                
                if (result.data && result.data.link) {
                    var newCreatedAt = result.data.created_at;
                    
                    // 检查是否是新数据
                    if (!lastCreatedAt || newCreatedAt !== lastCreatedAt) {
                        console.log('🔔 检测到新会议！');
                       lastCreatedAt = newCreatedAt;
                        showMeeting(result.data);
                        
                        var time = new Date().toLocaleTimeString();
                        updateStatus('✓ 已更新 (' + time + ')');
                    } else {
                        // 无新数据
                        var statusEl = document.getElementById('status');
                        if (!statusEl.textContent.includes('✓ 已更新')) {
                            updateStatus('在线 - 自动检查中');
                        }
                    }
                }
            } catch (e) {
                // 忽略"无记录"错误
                if (e.code !== 'PGRST116') {
                    console.error('检查失败:', e.message);
                }
            }
        }
        
        // 发送会议
        async function sendMeeting() {
            var link = document.getElementById('meetingLink').value.trim();
            
            if (!link) {
                alert('请先粘贴会议链接');
                return;
            }
            
            if (!link.startsWith('http://') && !link.startsWith('https://')) {
                alert('请输入完整的网址（以 http:// 或 https:// 开头）');
                return;
            }
            
            console.log('发送会议链接...');
            updateStatus('发送中...');
            
            try {
                var now = new Date().toISOString();
                var result = await db
                    .from('meetings')
                    .upsert({ 
                        room_id: roomId, 
                        link: link,
                        title: '即将开始的会议',
                        created_at: now
                    }, {
                        onConflict: 'room_id'
                    });
                
                if (result.error) {
                    console.error('发送失败:', result.error);
                    alert('发送失败: ' + result.error.message);
                    updateStatus('发送失败');
                    return;
                }
                
                console.log('✓ 发送成功');
                lastCreatedAt = now;
                
                // 显示成功提示
                var successEl = document.getElementById('successMsg');
                successEl.style.display = 'block';
                
                // 立即检查更新
                setTimeout(function() {
                    checkForUpdates();
                }, 500);
                
                // 隐藏成功提示
                setTimeout(function() {
                    successEl.style.display = 'none';
                }, 2000);
                
                updateStatus('✓ 发送成功');
                
            } catch (e) {
                console.error('发送异常:', e);
                alert('发送失败: ' + e.message);
                updateStatus('发送失败');
            }
        }
        
        // 显示会议
        function showMeeting(data) {
            console.log('显示会议:', data.title);
            currentLink = data.link;
            
            document.getElementById('meetingTitle').textContent = data.title || 'Teams 会议';
            
            if (data.created_at) {
                var time = new Date(data.created_at).toLocaleString('zh-CN');
                document.getElementById('meetingTime').textContent = '发送时间: ' + time;
            }
            
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('meetingArea').style.display = 'block';
        }
        
        // 返回输入
        function backToInput() {
            console.log('返回输入界面');
            document.getElementById('inputArea').style.display = 'block';
            document.getElementById('meetingArea').style.display = 'none';
            document.getElementById('meetingLink').value = '';
        }
        
        // 加入会议
        function joinMeeting() {
            if (!currentLink) return;
            
            console.log('加入会议:', currentLink);
            
            // 尝试拉起 Teams 应用
            var teamsProtocol = currentLink.replace('https://', 'msteams://');
            window.location.href = teamsProtocol;
            
            // 备用：打开网页版
            setTimeout(function() {
                window.open(currentLink, '_self');
            }, 1000);
        }
        
        // 更新状态显示
        function updateStatus(text) {
            var statusEl = document.getElementById('status');
            statusEl.textContent = '● ' + text;
            
            if (text.includes('检查中')) {
                statusEl.className = 'status checking';
            } else {
                statusEl.className = 'status';
            }
        }
        
        console.log('=== 系统就绪 ===');
    </script>
</body>
</html>
